<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 寰辰早會流程核對系統</title>
  <!-- Google Fonts & FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-container">
        <div class="logo-icon">寰</div>
        <div class="logo-text">
          <h1>早會流程核對系統</h1>
          <p class="subtitle">2026 寰辰早會 - 音控 & 主持工作確認表</p>
        </div>
      </div>
      <a href="admin.html" class="btn-link" style="position: absolute; right: 0; top: 10px;">
        <i class="fa-solid fa-user-gear"></i> 管理後台
      </a>
    </header>

    <!-- Progress Sticky Bar -->
    <div class="progress-container">
      <div class="progress-bar-wrapper">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div class="progress-text">
        <span>完成進度 <span id="progress-percent">0%</span></span>
        <span id="progress-ratio">0 / 0 已核對</span>
      </div>
    </div>

    <!-- Week Selector Card -->
    <div class="form-card" style="margin-bottom: 1.5rem;">
      <div class="form-group">
        <label for="week-select"><i class="fa-solid fa-calendar-week"></i> 請選擇早會週次 (2026年7月份)</label>
        <select id="week-select">
          <option value="">載入中...</option>
        </select>
      </div>
      
      <!-- Week Schedule Info Panel (Hidden until a week is selected) -->
      <div id="week-info-panel" style="display: none; margin-top: 1.25rem; padding: 1.25rem; background: var(--bg-cream); border: 1.5px dashed var(--border-color); border-radius: 12px; animation: slideUp 0.3s ease;">
        <h3 style="font-size: 0.95rem; font-weight: 700; margin-bottom: 0.75rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem;">
          <i class="fa-solid fa-star"></i> 本週值星輪值人員：
        </h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; font-size: 0.95rem; background: #FFFFFF; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--border-color);">
          <div><i class="fa-solid fa-microphone-lines" style="color: var(--primary); margin-right: 4px;"></i> <strong>主持人：</strong><span id="sched-host" style="font-weight: 700; color: var(--primary);">--</span></div>
          <div><i class="fa-solid fa-sliders" style="color: var(--primary); margin-right: 4px;"></i> <strong>音控 DJ：</strong><span id="sched-dj" style="font-weight: 700; color: var(--primary);">--</span></div>
        </div>
        
        <h4 style="font-size: 0.85rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-primary);">
          <i class="fa-solid fa-table-list"></i> 本週早會主題表：
        </h4>
        <div id="weekly-days-list" style="font-size: 0.85rem; display: flex; flex-direction: column; gap: 0.4rem; color: var(--text-secondary);">
          <!-- Dynamic days and activities -->
        </div>
      </div>
    </div>

    <!-- User Information Form -->
    <div class="form-card">
      <div class="form-group">
        <label for="username"><i class="fa-solid fa-signature"></i> 請輸入您的姓名</label>
        <input type="text" id="username" placeholder="例如：張小明" autocomplete="name">
      </div>
      
      <div class="form-group">
        <label><i class="fa-solid fa-id-card-clip"></i> 請選擇今日早會角色</label>
        <div class="role-tabs">
          <div class="role-tab" data-role="sound" id="tab-sound">
            <i class="fa-solid fa-sliders"></i>
            <span>音控人員</span>
          </div>
          <div class="role-tab" data-role="host" id="tab-host">
            <i class="fa-solid fa-microphone-lines"></i>
            <span>主持人員</span>
          </div>
        </div>
      </div>
    </div>



    <!-- Checklist Container (populated dynamically) -->
    <div id="checklist-container">
      <div class="empty-state">
        <i class="fa-solid fa-circle-info"></i>
        <p>請先填寫姓名並選擇今日的角色以載入工作項目。</p>
      </div>
    </div>

    <!-- Confirmation and Submit Actions -->
    <div class="actions" id="actions-container" style="display: none;">
      <div class="checkbox-confirm-wrapper" id="confirm-agreement">
        <div class="checkbox-container">
          <div class="custom-checkbox">
            <i class="fa-solid fa-check"></i>
          </div>
        </div>
        <div class="checkbox-confirm-text">我已確認並清楚了解上述所有工作流程與細節</div>
      </div>
      
      <button id="submit-btn" class="btn-submit">確認送出</button>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="success-overlay">
      <div class="success-icon">
        <i class="fa-solid fa-check"></i>
      </div>
      <h2 class="success-title">核對已完成！</h2>
      <p class="success-desc">感謝您的核對。我們已成功紀錄您的確認，您可以安全關閉此頁面，或協助下一次的流程核對。</p>
      <button class="btn-reset" id="reset-btn">重新填寫</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
